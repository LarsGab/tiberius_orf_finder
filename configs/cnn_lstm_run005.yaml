# CNN-LSTM training config (run005: mirrors run003, fixed shuffling, no early stopping).

data:
  chunk_len: 9999
  batch_size: 400
  shuffle_buffer: 2048

model:
  type: cnn_lstm

  conv_filters: 64
  conv_kernel: 9
  conv_layers: 2

  cnn_lstm:
    pool_size: 9
    lstm_units: 200
    lstm_layers: 2
    dropout: 0.0
    head_hidden: 32

  cnn_transformer:
    pool_size: 9
    d_model: 256
    num_heads: 4
    ff_dim: 512
    transformer_layers: 4
    dropout: 0.1
    head_hidden: 32

training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  epochs: 300
  steps_per_epoch: 2000
  class_weights: [1, 10, 1, 1, 1, 10]

  lr_reduce:
    monitor: val_loss
    patience: 7
    factor: 0.5
    min_lr: 1.0e-6

checkpointing:
  save_every_epoch: true
