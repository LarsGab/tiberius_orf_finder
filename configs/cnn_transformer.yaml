# CNN-Transformer training config (run002: warmup + cosine decay, weight decay).

data:
  chunk_len: 9999
  batch_size: 200
  shuffle_buffer: 2048

model:
  type: cnn_transformer

  conv_filters: 64
  conv_kernel: 9
  conv_layers: 2

  cnn_lstm:
    pool_size: 9
    lstm_units: 200
    lstm_layers: 2
    dropout: 0.3
    head_hidden: 32

  cnn_transformer:
    pool_size: 9
    d_model: 256
    num_heads: 4
    ff_dim: 512
    transformer_layers: 4
    dropout: 0.1
    head_hidden: 32

training:
  learning_rate: 5.0e-4   # peak LR after warmup
  weight_decay: 1.0e-4    # AdamW decoupled weight decay
  warmup_steps: 2000      # 1 epoch of linear warmup
  epochs: 150
  steps_per_epoch: 2000
  class_weights: [1, 10, 1, 1, 1, 10]

  early_stopping:
    monitor: val_loss
    patience: 20

checkpointing:
  save_every_epoch: true
