# Hyperparameters for tiberius_orf_finder training.
# All values here are overridable via CLI flags in scripts/train.py.

data:
  chunk_len: 9999
  batch_size: 32
  shuffle_buffer: 2048

model:
  lstm_units: 512
  lstm_layers: 3
  dropout: 0.1
  use_conv_stem: true
  conv_filters: 64
  conv_kernel: 11

training:
  learning_rate: 1.0e-3
  epochs: 50
  # per-class weights [IR, START, E1, E2, E0, STOP] — up-weight start/stop
  class_weights: [1, 10, 1, 1, 1, 10]

checkpointing:
  save_best_only: true
  monitor: val_loss
